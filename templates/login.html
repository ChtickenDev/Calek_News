{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h3 class="mb-4">Connexion</h3>

    {# ── Bouton Google ──────────────────────────────────────────────── #}
    <a href="{{ url_for('auth_google') }}"
       class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 mb-3"
       style="font-size:.95rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85L38.4 6.12A22.7 22.7 0 0 0 24 1C14.82 1 7.07 6.48 3.35 14.27l7.2 5.59C12.28 13.48 17.65 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.6 24.5c0-1.57-.14-3.09-.4-4.55H24v8.61h12.74a10.88 10.88 0 0 1-4.72 7.14l7.28 5.65C43.45 37.15 46.6 31.3 46.6 24.5z"/>
        <path fill="#FBBC05" d="M10.55 28.14A13.5 13.5 0 0 1 9.8 24c0-1.43.25-2.81.7-4.1l-7.2-5.59A22.93 22.93 0 0 0 1 24c0 3.68.88 7.16 2.43 10.25l7.12-6.11z"/>
        <path fill="#34A853" d="M24 47c6.48 0 11.93-2.14 15.9-5.82l-7.28-5.65c-2.16 1.45-4.93 2.32-8.62 2.32-6.35 0-11.72-3.98-13.63-9.57l-7.12 6.11C7.07 41.52 14.82 47 24 47z"/>
      </svg>
      Se connecter avec Google
    </a>

    <div class="d-flex align-items-center gap-2 mb-3">
      <hr class="flex-grow-1"> <span class="text-muted small">ou</span> <hr class="flex-grow-1">
    </div>

    {# ── Formulaire classique ───────────────────────────────────────── #}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <button class="btn btn-primary w-100">Se connecter</button>
    </form>

    <p class="mt-3 text-center small text-muted">
      Pas encore de compte ? <a href="{{ url_for('signup') }}">Créer un compte</a>
    </p>
  </div>
</div>
{% endblock %}
